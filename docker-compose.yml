version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-db_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-db_user} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8668:8668"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm_network
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8668 --workers 2"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "81:81"
    depends_on:
      - backend
    networks:
      - crm_network

  # ── pgAdmin (dev only — remove in production) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crm_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - crm_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  crm_network:
    driver: bridge
